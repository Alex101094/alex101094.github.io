<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Remi Hair Extensions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FCF6F3;
    --surface:#FFFFFF;
    --ink:#4A3940;
    --ink-light:#A4919A;
    --blush:#F6CDD6;
    --lavender:#E4D5EF;
    --sage:#D7E6DA;
    --line:#F1E2E6;
    --radius:24px;
    --radius-sm:14px;
    --shadow:0 12px 30px -18px rgba(74,57,64,0.35);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Quicksand',sans-serif; -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:'Fraunces',serif; margin:0; font-weight:600; }

  /* ---- Page transitions ---- */
  .page{ display:none; min-height:100vh; }
  .page.active{ display:block; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }

  /* ==============================
     HOME PAGE
  ============================== */
  .home-hero{
    padding:64px 24px 40px;
    text-align:center;
    overflow:hidden;
    position:relative;
  }
  .home-hero-inner{ max-width:560px; margin:0 auto; position:relative; z-index:2; }
  .eyebrow{
    font-size:12px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--ink-light); font-weight:600; margin:0 0 12px;
  }
  .home-hero h1{
    font-size:clamp(38px,7vw,64px); font-style:italic;
    line-height:1.05; margin-bottom:14px;
  }
  .home-hero p{
    font-size:16px; color:#7C6A71; line-height:1.6;
    max-width:400px; margin:0 auto;
  }
  .wave-divider{ display:block; width:100%; height:70px; margin-top:32px; }
  @media(prefers-reduced-motion:no-preference){
    .wave-divider .s1{ animation:drift 22s ease-in-out infinite alternate; }
    .wave-divider .s2{ animation:drift 28s ease-in-out infinite alternate-reverse; }
    .wave-divider .s3{ animation:drift 34s ease-in-out infinite alternate; }
  }
  @keyframes drift{ from{transform:translateX(-2%)} to{transform:translateX(2%)} }

  /* Color group grid on home */
  .home-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    padding:8px 20px 64px;
    max-width:700px;
    margin:0 auto;
  }

  .color-card{
    background:var(--surface);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform 0.25s ease, box-shadow 0.25s ease;
    border:none;
    text-align:left;
    width:100%;
    padding:0;
  }
  .color-card:hover{ transform:translateY(-4px); box-shadow:0 18px 36px -18px rgba(74,57,64,0.45); }

  .color-card-banner{
    width:100%; height:110px;
    display:flex; align-items:center; justify-content:center;
  }
  .color-card-swatch{
    width:64px; height:64px; border-radius:50%;
    border:4px solid rgba(255,255,255,0.6);
    box-shadow:0 4px 16px rgba(0,0,0,0.15);
  }
  .color-card-body{ padding:14px 16px 18px; }
  .color-card-body h3{
    font-size:16px; font-weight:700; margin-bottom:4px;
  }
  .color-card-body p{
    font-size:13px; color:var(--ink-light); margin:0; line-height:1.4;
  }
  .color-card-arrow{
    display:flex; align-items:center; justify-content:flex-end;
    padding:0 16px 14px; font-size:18px; color:var(--ink-light);
  }

  /* ==============================
     COLOR DETAIL PAGE
  ============================== */
  .detail-header{
    position:sticky; top:0; z-index:10;
    background:rgba(252,246,243,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:0 16px;
  }
  .detail-header-inner{
    max-width:700px; margin:0 auto;
    display:flex; align-items:center; gap:14px;
    height:58px;
  }
  .back-btn{
    display:flex; align-items:center; gap:6px;
    background:none; border:none; cursor:pointer;
    font-family:'Quicksand',sans-serif; font-weight:700;
    font-size:14px; color:var(--ink); padding:8px 0;
    flex:0 0 auto;
  }
  .back-btn svg{ flex:0 0 auto; }

  .detail-title{
    font-family:'Fraunces',serif;
    font-size:20px; font-style:italic; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* Sub-color nav inside detail page */
  .sub-nav{
    display:flex; gap:8px; overflow-x:auto;
    padding:12px 20px;
    background:rgba(252,246,243,0.85);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    scrollbar-width:thin;
    position:sticky; top:58px; z-index:9;
  }
  .sub-nav::-webkit-scrollbar{ height:5px; }
  .sub-nav::-webkit-scrollbar-thumb{ background:var(--blush); border-radius:10px; }

  .sub-pill{
    flex:0 0 auto;
    display:flex; align-items:center; gap:7px;
    padding:7px 14px 7px 7px;
    border-radius:999px; border:1px solid var(--line);
    background:var(--surface); color:var(--ink);
    font-family:'Quicksand',sans-serif; font-weight:600; font-size:13px;
    cursor:pointer; white-space:nowrap;
    transition:transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .sub-pill:hover{ transform:translateY(-2px); box-shadow:var(--shadow); }
  .sub-pill.active{ border-color:transparent; box-shadow:var(--shadow); }
  .sub-pill-swatch{
    width:20px; height:20px; border-radius:50%; flex:0 0 auto;
    border:2px solid var(--surface); outline:1px solid var(--line);
  }

  /* Sub-group sections */
  .detail-body{ padding:32px 20px 64px; max-width:700px; margin:0 auto; }

  .sub-group{ margin-bottom:48px; scroll-margin-top:120px; }
  .sub-group:last-child{ margin-bottom:0; }

  .sub-group-head{
    display:flex; align-items:center; gap:12px; margin-bottom:20px;
  }
  .sub-group-head h3{ font-size:18px; font-weight:600; font-style:italic; }
  .sub-divider{ flex:1; height:1px; background:var(--line); }

  .photo-grid{
    display:grid; grid-template-columns:repeat(2,1fr); gap:14px;
  }
  .photo-card{
    background:var(--surface); border-radius:var(--radius);
    overflow:hidden; box-shadow:var(--shadow);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  .photo-card:hover{ transform:translateY(-4px); box-shadow:0 18px 36px -18px rgba(74,57,64,0.45); }

  /* Carousel */
  .carousel{
    position:relative; overflow:hidden;
  }
  .carousel-track{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .carousel-track::-webkit-scrollbar{ display:none; }
  .carousel-slide{
    flex:0 0 100%;
    scroll-snap-align:start;
  }
  .photo-placeholder{
    width:100%; aspect-ratio:4/5;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:10px; color:#fff; text-align:center; padding:16px;
  }
  .photo-placeholder img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .placeholder-icon{ width:32px; height:32px; opacity:0.85; }
  .placeholder-text{
    font-size:11px; letter-spacing:0.06em;
    text-transform:uppercase; font-weight:600; opacity:0.8;
  }

  /* Dot indicators */
  .carousel-dots{
    display:flex; justify-content:center; gap:5px;
    padding:8px 0 4px;
  }
  .carousel-dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--line); border:none; padding:0; cursor:pointer;
    transition:background 0.2s ease, transform 0.2s ease;
    flex:0 0 auto;
  }
  .carousel-dot.active{
    background:var(--ink-light); transform:scale(1.3);
  }
  .photo-card-info{ padding:10px 12px 14px; text-align:center; }
  .photo-card-info .photo-label{ margin:0 0 6px; font-size:13px; color:var(--ink-light); font-weight:600; }
  .photo-card-meta{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:6px; padding-top:6px; border-top:1px solid var(--line);
  }
  .photo-length{
    font-size:12px; font-weight:600; letter-spacing:0.06em;
    text-transform:uppercase; color:var(--ink-light);
  }
  .photo-price{
    font-family:'Fraunces',serif; font-size:18px; font-weight:600; color:var(--ink);
  }

  /* ==============================
     FOOTER
  ============================== */
  .site-footer{
    text-align:center; padding:48px 24px 64px;
    border-top:1px solid var(--line);
  }
  .site-footer h2{ font-style:italic; font-size:24px; margin-bottom:10px; }
  .site-footer p{ color:#8A7780; font-size:15px; max-width:380px; margin:0 auto; line-height:1.6; }

  .social-links{
    display:flex; justify-content:center; gap:20px; margin-top:24px;
  }
  .social-link{
    display:flex; align-items:center; justify-content:center;
    width:48px; height:48px; border-radius:50%;
    background:var(--surface); box-shadow:var(--shadow);
    color:var(--ink); text-decoration:none;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
  }
  .social-link:hover{ transform:translateY(-3px); box-shadow:0 16px 32px -16px rgba(74,57,64,0.45); }
  .social-link svg{ width:22px; height:22px; }
  @media(max-width:480px){
    .home-hero{ padding:48px 16px 28px; }
    .home-grid{ padding:8px 16px 48px; gap:14px; }
    .color-card-banner{ height:90px; }
    .color-card-swatch{ width:52px; height:52px; }
    .color-card-body h3{ font-size:14px; }
    .color-card-body p{ font-size:12px; }
  }
</style>
</head>

/* ===================== Helpers ===================== */

  <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ===================== Build home grid ===================== */
const homeGrid = document.getElementById('homeGrid');

INVENTORY.forEach((group, index) => {
  const card = document.createElement('button');
  card.className = 'color-card';
  card.setAttribute('aria-label', `View ${group.name}`);
  card.innerHTML = `
    <div class="color-card-banner" style="background:${group.bannerBg}">
    </div>
    <div class="color-card-body">
      <h3>${group.name}</h3>
      <p>${group.description}</p>
    </div>
    <div class="color-card-arrow">→</div>
  `;
  card.addEventListener('click', () => openDetail(index));
  homeGrid.appendChild(card);
});

/* ===================== Build & open detail page ===================== */
function openDetail(index) {
  const group = INVENTORY[index];
  document.getElementById('detailTitle').textContent = group.name;

  // Build sub-nav
  const subNav = document.getElementById('subNav');
  subNav.innerHTML = '';
  group.subColors.forEach((subColor, i) => {
    const subId = `sub-${i}`;
    const pill = document.createElement('button');
    pill.className = 'sub-pill' + (i === 0 ? ' active' : '');
    pill.innerHTML = `<span class="sub-pill-swatch" style="background:${subColor.color}"></span>${subColor.name}`;
    pill.addEventListener('click', () => {
      const target = document.getElementById(subId);
      if (target) {
        const offset = document.querySelector('.detail-header').offsetHeight
                     + document.querySelector('.sub-nav').offsetHeight + 16;
        const top = target.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    });
    subNav.appendChild(pill);
  });

  // Build detail body
  const detailBody = document.getElementById('detailBody');
  detailBody.innerHTML = '';

  group.subColors.forEach((subColor, i) => {
    const subGroup = document.createElement('div');
    subGroup.className = 'sub-group';
    subGroup.id = `sub-${i}`;

    const photos = subColor.photos.map((photo, j) => {
      // Each photo entry can have an `images` array; fall back to one placeholder
      const slides = (photo.images && photo.images.length > 0)
        ? photo.images.map(src => `
            <div class="carousel-slide">
              <div class="photo-placeholder" style="background:${subColor.color}">
                <img src="${src}" alt="${subColor.name} ${photo.length}">
              </div>
            </div>`)
        : [`<div class="carousel-slide">
              <div class="photo-placeholder" style="background:${subColor.color}">
                ${placeholderIcon}
                <span class="placeholder-text">Photo coming soon</span>
              </div>
            </div>`];

      const dots = slides.length > 1
        ? `<div class="carousel-dots">${slides.map((_, k) =>
            `<button class="carousel-dot${k === 0 ? ' active' : ''}" aria-label="Slide ${k+1}"></button>`
          ).join('')}</div>`
        : '';

      return `
        <div class="photo-card">
          <div class="carousel">
            <div class="carousel-track">${slides.join('')}</div>
            ${dots}
          </div>
          <div class="photo-card-info">
            <p class="photo-label">Photo ${j + 1}</p>
            <div class="photo-card-meta">
              <span class="photo-length">${photo.length}</span>
              <span class="photo-price">$${photo.price}</span>
            </div>
          </div>
        </div>`;
    }).join('');

    subGroup.innerHTML = `
      <div class="sub-group-head">
        <h3>${subColor.name}</h3>
        <div class="sub-divider"></div>
      </div>
      <div class="photo-grid">${photos}</div>
    `;
    detailBody.appendChild(subGroup);
  });

  // Wire up carousel dots
  detailBody.querySelectorAll('.carousel').forEach(carousel => {
    const track = carousel.querySelector('.carousel-track');
    const dots = carousel.querySelectorAll('.carousel-dot');
    if (!dots.length) return;
    track.addEventListener('scroll', () => {
      const idx = Math.round(track.scrollLeft / track.clientWidth);
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }, { passive: true });
    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => {
        track.scrollTo({ left: i * track.clientWidth, behavior: 'smooth' });
      });
    });
  });
  const subSections = Array.from(detailBody.querySelectorAll('.sub-group'));
  const pills = Array.from(subNav.querySelectorAll('.sub-pill'));

  const spy = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        pills.forEach(p => p.classList.remove('active'));
        const idx = subSections.indexOf(entry.target);
        if (pills[idx]) pills[idx].classList.add('active');
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });

  subSections.forEach(s => spy.observe(s));

  showPage('page-detail');
}

/* ===================== Back button ===================== */
document.getElementById('backBtn').addEventListener('click', () => {
  showPage('page-home');
});
</script>
</body>
</html>
